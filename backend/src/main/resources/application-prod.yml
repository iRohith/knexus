# ============================================================
# Knowledge Nexus — Production Profile
# ============================================================

spring:
  # --- DataSource ---
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # --- JPA ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # --- Kafka ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

# --- JWT ---
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 900000      # 15 minutes
  refresh-token-expiry-ms: 604800000  # 7 days

# --- Cognee ---
cognee:
  base-url: ${COGNEE_BASE_URL}
  api-key: ${COGNEE_API_KEY}
  connect-timeout-ms: 5000
  read-timeout-ms: 60000

# --- Logging ---
logging:
  level:
    root: WARN
    com.corp_krc.backend: INFO
